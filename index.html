<!DOCTYPE html>
<html>
<head>

  <div class="content">

  <h1>
    💗 Stay Hydrated my cutieee 💗<br>
    💕 Mera strong bachhaaaa I loveee youuu sooo much 💕
  </h1>

  <button onclick="playMusic()" class="magic-btn">
    💖 Tap for Magic 💖
  </button>

</div>

<title>For You ❤️</title>

<style>

/* 🔥 CLEAN BODY */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;

  background: url("photo.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* 🔥 OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  pointer-events: none;
}
  .content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  z-index: 1;
}

.magic-btn {
  margin-top: 10px;
}

/* 🔥 BUTTON */
.magic-btn {
  padding: 18px 35px;
  font-size: 20px;
  border-radius: 30px;

  background: linear-gradient(45deg, #ff9ecb, #ff4d88);
  color: white;
  font-weight: bold;

  cursor: pointer;
  border: none;

  box-shadow: 
    0 0 10px rgba(255, 77, 136, 0.6),
    0 0 20px rgba(255, 77, 136, 0.6);

  text-shadow: 0 0 5px #fff, 0 0 10px #ff4d88;

  transition: 0.3s ease;
}

.magic-btn:hover {
  transform: scale(1.1);

  box-shadow: 
    0 0 20px #ff4d88,
    0 0 40px #ff4d88;
}
/* TEXT */
h1 {
  color: #ffffff;
  text-align: center;
  z-index: 1;

  text-shadow: 
    0 0 5px #fff,
    0 0 10px #ff9ecb,
    0 0 20px #ff4d88,
    0 0 30px #ff4d88;
}

/* HEART */
.heart {
  position: absolute;
  color: #ff69b4;
  font-size: 30px;

  text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff1493;

  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-100vh); }
}

</style>

</head>

<body>

<div class="overlay"></div> <!-- 👈 yaha hona chahiye -->


<audio id="bgMusic" loop>
  <source src="Ed%20Sheeran%20-%20Perfect.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
  document.getElementById("bgMusic").play();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";

  /* 👇 YE ADD KAR */
  heart.style.fontSize = (Math.random() * 40 + 30) + "px";

  heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 150);
</script>
</body>
</html>
