<!DOCTYPE html>
<html>
<head>

<title>For You ❤️</title>

<style>

/* 🔥 CLEAN BODY */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;

  background: url("photo.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/* 🔥 OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.3);
  pointer-events: none;
}

/* 🔥 BUTTON */
.magic-btn {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff9ecb, #ff4d88);
  color: white;
  font-weight: bold;
  margin-top: 25px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(255, 77, 136, 0.5);
}

/* TEXT */
h1 {
  color: white;
  text-align: center;
  z-index: 1;
}

/* HEART */
.heart {
  position: absolute;
  color: #ff69b4;
  font-size: 24px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-100vh); }
}

</style>

</head>

<body>

<div class="overlay"></div> <!-- 👈 yaha hona chahiye -->

<h1>
💗 Stay Hydrated my cutieee 💗<br>
💕 Mera strong bachhaaaa I loveee youuu sooo much 💕
</h1>

<button onclick="playMusic()" class="magic-btn">
💖 Tap for Magic 💖
</button>

<audio id="bgMusic" loop>
  <source src="Ed%20Sheeran%20-%20Perfect.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
  document.getElementById("bgMusic").play();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";
  heart.style.left = Math.random() * 100 + "vw";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 150);
</script>

</body>
</html>
