<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>

/* 🔥 BODY */
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* 🔥 BACKGROUND */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url("us.jpg") no-repeat center center;
  background-size: cover;
  filter: blur(2px);

  z-index: -2;

  animation: zoomBg 20s ease-in-out infinite alternate;
}

@keyframes zoomBg {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* 🔥 OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  pointer-events: none;
  z-index: -1;
}

/* 🔥 CONTENT */
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  z-index: 1;
}

/* 🔥 TEXT */
h1 {
  color: #fff;
  text-align: center;

  text-shadow: 
    0 0 5px #fff,
    0 0 10px #ff9ecb,
    0 0 20px #ff4d88;
}

/* 🔥 BUTTON */
.magic-btn {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);

  padding: 18px 35px;
  font-size: 22px;
  border-radius: 30px;

  background: linear-gradient(45deg, #ff9ecb, #ff4d88);
  color: white;
  font-weight: bold;

  cursor: pointer;
  border: none;

  box-shadow: 
    0 0 10px rgba(255, 77, 136, 0.6),
    0 0 20px rgba(255, 77, 136, 0.6);

  text-shadow: 0 0 5px #fff;
  transition: 0.3s;
}

.magic-btn:hover {
  transform: translateX(-50%) scale(1.1);
}

/* 🔥 HEART */
.heart {
  position: absolute;
  color: #ff69b4;
  font-size: 30px;

  text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4;

  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-100vh); }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>
    💗 Stay Hydrated my cutieee 💗<br>
    💕 Mera strong bachhaaaa I loveee youuu sooo much 💕
  </h1>
</div>

<button onclick="playMusic()" class="magic-btn">
  💖 Tap for Magic 💖
</button>

<audio id="bgMusic" loop>
  <source src="Ed%20Sheeran%20-%20Perfect.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
  document.getElementById("bgMusic").play();
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💗";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 40 + 30) + "px";
  heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
